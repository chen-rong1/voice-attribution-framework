name: Bug Report
description: 报告一个可复现的问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量提供可复现的信息，便于确认问题。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 请简要描述实际现象和预期行为。
      placeholder: 例如：运行 `scripts/run_benchmark.py` 时出现异常，预期应正常生成报告。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 请按顺序描述如何复现。
      placeholder: |
        1. 准备输入数据
        2. 执行命令
        3. 观察报错
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志或报错信息
      description: 请粘贴关键日志、异常堆栈或终端输出。
      render: text
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 例如操作系统、Python 版本、安装方式、是否使用默认模型。
      placeholder: |
        OS:
        Python:
        Install:
        Model:
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: 其他补充
      description: 可补充输入格式、配置文件、截图或额外背景。
    validations:
      required: false
