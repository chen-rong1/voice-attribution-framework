name: Feature Request
description: 提交一个功能建议或改进提案
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议。请尽量说明问题背景、使用场景和预期收益。
  - type: textarea
    id: problem
    attributes:
      label: 背景问题
      description: 当前缺少什么能力，或现有行为有什么局限。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 请描述你希望新增或调整的内容。
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 影响范围
      description: 请说明大致会影响哪些模块、配置或流程。
      placeholder: 例如：benchmark CLI、模型加载、报告导出、文档等。
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 如果你考虑过其他方案，也可以在这里说明。
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: 其他补充
      description: 可补充示例、参考链接或预期接口形式。
    validations:
      required: false
